<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>my portfolio</title>
</head>
<body>
  <h1>student data</h1>
  {% if students %}
  <table>
    <thead>
    <tr>
      <th>name</th>
      <th>age</th>
      <th>city</th>

    </tr>

    </thead>
    {% for student in students %}
    <tbody>
      <tr>
        <td>{{student.name}}</td>
        <td>{{student.age}}</td>
        <td>{{student.city}}</td>
      </tr>
    
    {%endfor%}
    </tbody>

  </table>
  {%else%}
  <p>no student data available</p>
  {%endif%}



  
</body>
</html>
